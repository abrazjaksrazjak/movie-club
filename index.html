<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JLL Movie Club – współdzielony ranking</title>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e5e5e5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) 0 0 0;
            min-height: -webkit-fill-available;
        }
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        .app-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 1.2rem 1rem 1rem 1rem;
            overflow: hidden;
        }
        .club-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        .club-header h1 {
            font-size: clamp(0.9rem, 5vw, 1.1rem);
            font-weight: 400;
            color: #c0c0c0;
            cursor: pointer;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .club-header h1:hover {
            color: #d4af37;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }
        .header-buttons {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: #a0a0a0;
            font-size: 1.2rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 10px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            color: #d4af37;
            background: rgba(212,175,55,0.08);
            transform: scale(1.1);
        }
        #mainContent {
            flex: 1;
            min-height: 0;
            position: relative;
            width: 100%;
            overflow: auto;
        }
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 1.2rem 1.8rem;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(212,175,55,0.3);
            box-shadow: 0 0 15px rgba(212,175,55,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212,175,55,0.2);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-indicator p:first-child {
            color: #d4af37;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .loading-indicator p:last-child {
            color: #aaa;
            font-size: 0.7rem;
        }
        .carousel-viewport {
            width: 100%;
            overflow: hidden;
            height: 100%;
            scrollbar-width: none;
        }
        .carousel-viewport::-webkit-scrollbar { display: none; }
        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .carousel-slide {
            width: 100%;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
        }
        .slide-fade {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .slide-fade-out {
            opacity: 0;
            transform: scale(0.96);
        }
        .view-transition { transition: opacity 0.2s ease; }
        .view-fade-out { opacity: 0; }

        .carousel-container {
            background: #111;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.8);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.2);
            transition: box-shadow 0.3s;
        }
        .carousel-container:hover {
            box-shadow: 0 16px 32px rgba(0,0,0,0.9), 0 0 0 1px rgba(212,175,55,0.3);
        }
        .slide {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .poster-wrapper {
            width: 100%;
            height: clamp(180px, 30vh, 280px);
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
            flex-shrink: 0;
        }
        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .poster-wrapper:hover .poster-img {
            transform: scale(1.03);
        }
        .movie-title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(1.2rem,5vw,2rem);
            font-weight: 500;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            background: linear-gradient(90deg,transparent,rgba(0,0,0,0.6),transparent);
            padding: 0.4rem;
            backdrop-filter: blur(3px);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none !important;
        }
        .movie-title-overlay:hover {
            color: #d4af37;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(212,175,55,0.8);
            background: linear-gradient(90deg,transparent,rgba(0,0,0,0.7),transparent);
        }
        .edit-movie-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border: none;
            color: #ddd;
            font-size: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        .poster-wrapper:hover .edit-movie-btn {
            opacity: 1;
            transform: scale(1.05);
        }
        .edit-movie-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
            transform: scale(1.1);
        }
        .movie-date {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin: 0.6rem 0 0.8rem 0;
            letter-spacing: 1px;
        }
        .movie-link {
            text-align: center;
            margin: 0.2rem 0 0.5rem;
        }
        .movie-link a {
            color: #d4af37;
            font-size: 0.7rem;
            text-decoration: none;
            border-bottom: 1px dashed #d4af37;
            transition: all 0.2s;
        }
        .movie-link a:hover {
            color: #f5d742;
            border-bottom-style: solid;
        }
        .reviews-grid {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .review-row {
            display: flex;
            gap: 0.8rem;
            position: relative;
            border-bottom: 1px solid #252525;
            padding-bottom: 0.7rem;
            flex-wrap: wrap;
            transition: all 0.2s;
        }
        .review-row:hover .stars .star-filled {
            text-shadow: 0 0 8px #d4af37;
        }
        .review-row.pending { opacity: 0.6; }
        .review-left {
            flex: 0 0 100px;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .stars {
            display: inline-flex;
            gap: 0;
            align-items: center;
        }
        .star {
            display: inline-block;
            width: 1rem;
            text-align: center;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }
        .star-filled { color: #d4af37; transition: text-shadow 0.2s; }
        .star-empty { color: #3d3d3d; }
        .verified-check { color: #d4af37; font-size: 0.8rem; margin-left: 4px; }
        .review-author { font-size: 0.75rem; color: #b0b0b0; }
        .review-comment {
            flex: 1;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #cfcfcf;
            align-self: flex-end;
            padding-right: 1.2rem;
            min-width: 150px;
            transition: text-shadow 0.2s;
        }
        .review-actions {
            position: absolute;
            right: 0;
            top: 0;
            display: flex;
            gap: 0.3rem;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 0.1rem 0.3rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .review-row:hover .review-actions { opacity: 1; }
        .review-action-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 20px;
            padding: 0.1rem 0.3rem;
            transition: all 0.2s;
        }
        .review-action-btn:hover { background: #2a2a2a; color: #d4af37; transform: scale(1.2); }
        .delete-review-btn:hover { color: #e06c4e; }
        .edit-review-btn, .delete-own-review-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 20px;
            padding: 0.1rem 0.3rem;
        }
        .edit-review-btn:hover, .delete-own-review-btn:hover { color: #f5d742; transform: scale(1.2); }
        .sentimental {
            margin: 0.6rem 1rem;
            padding: 0.5rem 0.8rem;
            background: #181818;
            border-left: 3px solid #d4af37;
            font-size: 0.75rem;
            color: #b9a97c;
            border-radius: 12px;
            text-align: center;
        }
        .add-review {
            background: #111;
            border-top: 1px solid #262626;
            padding: 0.8rem 1rem 1rem;
        }
        .review-form-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .review-form-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.8rem;
            align-items: stretch;
        }
        .review-form-left {
            flex: 0 0 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.3rem;
        }
        .review-form-left input {
            background: #1c1c1c;
            border: 1px solid #2c2c2c;
            border-radius: 12px;
            padding: 0.4rem 0.5rem;
            font-size: 0.7rem;
            color: #eee;
            width: 100%;
            text-align: center;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .review-form-left input:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 5px rgba(212,175,55,0.5);
        }
        .rating-input {
            display: inline-flex;
            gap: 0;
            background: #1c1c1c;
            padding: 0.2rem 0.4rem;
            border-radius: 30px;
            justify-content: center;
        }
        .star-select {
            display: inline-block;
            width: 1rem;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            color: #4a4a4a;
            transition: transform 0.1s, color 0.1s;
        }
        .star-select.selected { color: #d4af37; transform: scale(1.1); }
        .star-select:hover { transform: scale(1.2); }
        .review-form-middle {
            flex: 2;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        .review-form-middle textarea {
            width: 100%;
            height: 100%;
            background: #1c1c1c;
            border: 1px solid #2c2c2c;
            border-radius: 12px;
            padding: 0.4rem 0.5rem;
            font-size: 0.7rem;
            color: #eee;
            resize: vertical;
            font-family: inherit;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .review-form-middle textarea:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 5px rgba(212,175,55,0.5);
        }
        .avg-box {
            flex: 0 0 70px;
            background: #1c1c1c;
            border: 1px solid #2c2c2c;
            border-radius: 12px;
            padding: 0.5rem 0.2rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: #d4af37;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .avg-box:hover {
            background: #2a2a2a;
            transform: scale(1.02);
            border-color: #d4af37;
        }
        /* Strzałki – przezroczyste, mniejsze */
        .nav-arrow {
            position: fixed;
            color: #aaa;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 100;
            background: none;
            border: none;
            padding: 0.3rem;
            transition: color 0.2s, transform 0.2s;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
            display: none;
            opacity: 0.5;
        }
        .nav-arrow:hover {
            color: #d4af37;
            transform: scale(1.1);
            opacity: 1;
        }
        .nav-arrow-left { left: 8px; }
        .nav-arrow-right { right: 8px; }
        .home-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        /* KARTA NAJBLIŻSZEGO SEANSU – z glowem śledzącym kursor */
        .next-movie-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            position: sticky;
            top: 0;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            --x: 50%;
            --y: 50%;
        }
        .next-movie-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%),
                rgba(212,175,55,0.15) 0%,
                transparent 70%
            );
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.2s;
            border-radius: 20px;
        }
        .next-movie-card:hover::after {
            opacity: 0.7;
        }
        .next-movie-card .poster {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            background: #0f0f0f;
            transition: filter 0.2s, background 0.05s linear;
            position: relative;
            z-index: 1;
        }
        .next-movie-card:hover {
            transform: translateY(-2px);
        }
        .next-movie-card:hover .poster {
            filter: brightness(1.02);
        }
        .next-movie-card h2 {
            font-size: 0.85rem;
            color: #d4af37;
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }
        .next-movie-card .title { font-size: 1.4rem; font-weight: 600; margin: 0.3rem 0; }
        .next-movie-card .date { font-size: 0.7rem; color: #aaa; }
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0.8rem 0 0.6rem;
            flex-wrap: nowrap;
            gap: 0.8rem;
        }
        .ranking-header h3, .clickable-text {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .ranking-header h3 {
            color: #c0c0c0;
        }
        .clickable-text {
            cursor: pointer;
            color: #d4af37;
            transition: color 0.2s, text-shadow 0.2s;
            white-space: nowrap;
        }
        .clickable-text:hover {
            color: #f5d742;
            text-shadow: 0 0 3px rgba(212,175,55,0.5);
        }
        .ranking-section { padding: 0 0.8rem; }
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1rem;
        }
        .ranking-item {
            position: relative;
            background: #151515;
            border-radius: 14px;
            padding: 0.7rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #262626;
            overflow: hidden;
            z-index: 1;
            transition: all 0.2s ease;
            min-height: 70px;
        }
        .ranking-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: inherit;
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -2;
            transition: opacity 0.2s;
        }
        .ranking-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(15,15,15,0.9) 0%, rgba(15,15,15,0.6) 30%, rgba(15,15,15,0.6) 70%, rgba(15,15,15,0.9) 100%);
            z-index: -1;
        }
        .ranking-item:hover {
            transform: scale(1.02);
            border-color: #d4af37;
            background: #1f1f1f;
        }
        .ranking-item:hover::before { opacity: 0.3; }
        .ranking-title {
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.3rem;
        }
        .ranking-rating { color: #d4af37; font-size: 0.8rem; font-weight: 600; position: relative; z-index: 1; }
        .badge-text {
            font-size: 0.7rem;
            color: #888;
            font-weight: normal;
            margin-left: 0.5rem;
        }
        @media (max-width: 600px) {
            .ranking-title { flex-direction: column; gap: 0.2rem; }
            .badge-text { margin-left: 0; }
            .review-form-left { flex-basis: 80px; }
            .review-form-left input { font-size: 0.65rem; padding: 0.3rem 0.3rem; }
            .star-select { width: 0.85rem; font-size: 0.8rem; }
            .review-form-middle textarea { font-size: 0.65rem; padding: 0.3rem 0.4rem; }
            .avg-box { flex-basis: 55px; font-size: 0.75rem; padding: 0.3rem 0.1rem; }
            .nav-arrow { font-size: 1.5rem; }
        }
        @media (max-width: 480px) {
            .next-movie-card .poster { max-height: 240px; }
            .ranking-header { gap: 0.3rem; }
            .ranking-header h3, .clickable-text { font-size: 0.7rem; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeInModal 0.2s ease;
        }
        @keyframes fadeInModal {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(8px); }
        }
        .modal-content {
            background: #141414;
            max-width: 550px;
            width: 90%;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #2c2c2c;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { font-size: 1.2rem; margin-bottom: 1rem; color: #d4af37; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #2c2c2c;
            border-radius: 12px;
            background: #1c1c1c;
            color: #eee;
            font-size: 0.85rem;
            transition: border 0.2s;
        }
        .modal-content input:focus, .modal-content textarea:focus {
            border-color: #d4af37;
            outline: none;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        .modal-buttons button {
            background: #2a2a2a;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-buttons button:hover {
            background: #3a3a3a;
            transform: scale(1.02);
        }
        .modal-buttons button:last-child {
            background: #d4af37;
            color: #0a0a0a;
        }
        .modal-buttons button:last-child:hover {
            background: #c99f1a;
            transform: scale(1.02);
        }
        .modal-buttons button.danger-btn {
            background: #5a2a2a;
            color: #ffaaaa;
        }
        .modal-buttons button.danger-btn:hover {
            background: #8a3a3a;
            color: white;
        }
        hr { border-color: #2c2c2c; margin: 1rem 0; }
        .proposals-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin: 0.5rem 0;
        }
        .proposal-item {
            background: #1e1e2a;
            border-radius: 12px;
            padding: 0.4rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2c2c2c;

    <div id="editReviewModal" class="modal"><div class="modal-content"><h3>Edytuj swoją recenzję</h3><div class="rating-input" id="editStarSelector"></div><textarea id="editReviewComment" rows="3" placeholder="Treść recenzji"></textarea><div class="modal-buttons"><button id="cancelEditReviewBtn">Anuluj</button><button id="saveEditReviewBtn">Zapisz zmiany</button></div></div></div>

    <script>
        // ---------- SESSION TOKEN ----------
        function getSessionToken() {
            let token = sessionStorage.getItem('reviewSessionToken');
            if (!token) {
                token = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                sessionStorage.setItem('reviewSessionToken', token);
            }
            return token;
        }

        // Dynamiczne hasło admina

            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return `admin${day}${month}`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDyJDEMa0H4w8krL5vrg9C-oPCIvBDmReE",
            authDomain: "movie-club-f8ceb.firebaseapp.com",

            storageBucket: "movie-club-f8ceb.firebasestorage.app",

            appId: "1:17251318633:web:5080a0bc0243e1a91d1bf8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        auth.signInAnonymously().catch(console.error);

        const defaultMovies = [
            { id:"lobster_2026", date:"02.04.2026", title:"Lobster", poster:"https://via.placeholder.com/1200x300?text=Lobster", link:"", reviews:[
                { author:"Sebuś", stars:4, comment:"Depresyjny obraz...", approved:true, verified:false, timestamp:Date.now() },

                { author:"Daria", stars:5, comment:"Piękne obrazy", approved:true, verified:false, timestamp:Date.now()+4 },

            ], sentimentalValue:"Odbierzemy go..." },

                { author:"Grzegorz", stars:4, comment:"Czwórka", approved:true, verified:false, timestamp:Date.now()+3 },

                { author:"Kuba", stars:5, comment:"Obejrzałem w całości", approved:true, verified:false, timestamp:Date.now()+5 },
                { author:"Ola", stars:5, comment:"Świetna gra", approved:true, verified:false, timestamp:Date.now()+6 }
            ], sentimentalValue:"" }
        ];

        let movies = [], currentMovieIndex = 0, viewMode = 'home', unsubscribeMovies = null, isAdmin = false;
        let adminTimeout = null;
        const ADMIN_SESSION_DURATION = 5 * 60 * 1000;
        let currentEditReviewData = null;
        let track = null, currentSlideIndex = 0;

        function setAdminMode(admin) {
            if (adminTimeout) clearTimeout(adminTimeout);
            isAdmin = admin;
            if (admin) {
                sessionStorage.setItem('movieclub_admin','true');
                adminTimeout = setTimeout(() => {
                    setAdminMode(false);
                    alert("Sesja administratora wygasła po 5 minutach.");
                    if (viewMode === 'movie') renderMovie(); else renderHome();
                }, ADMIN_SESSION_DURATION);
            } else {
                sessionStorage.removeItem('movieclub_admin');
                if (adminTimeout) clearTimeout(adminTimeout);
                adminTimeout = null;
            }
            if (document.getElementById('proposeModal').style.display === 'flex') loadProposals();
        }
        function checkAdminFromStorage() { if (sessionStorage.getItem('movieclub_admin')==='true') setAdminMode(true); }
        function showAdminLoginModal() { document.getElementById('adminLoginModal').style.display = 'flex'; document.getElementById('adminPassword').value = ''; }
        function isAdminAction() { if (isAdmin) return true; const pwd = prompt("Hasło admina:"); if (pwd === getDynamicAdminPassword()) { setAdminMode(true); return true; } return false; }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function renderStars(rating) { let h='<span class="stars">'; for(let i=1;i<=5;i++) h+=`<span class="star ${i<=rating?'star-filled':'star-empty'}">★</span>`; return h+'</span>'; }
        function avgWeighted(m) { let total=0,weight=0; m.reviews.forEach(r=>{ if(r.approved){ let w=r.verified?2:1; total+=r.stars*w; weight+=w; } }); return weight===0?'—':(total/weight).toFixed(1); }
        function countApprovedReviews(m) { return m.reviews.filter(r=>r.approved).length; }
        function parseDate(dateStr) { let p=dateStr.split('.'); return new Date(p[2],p[1]-1,p[0]); }
        function getNextMovie() { let today=new Date(); today.setHours(0,0,0,0); let future=movies.filter(m=>parseDate(m.date)>=today); if(future.length) return future.sort((a,b)=>parseDate(a.date)-parseDate(b.date))[0]; return movies.length?movies.reduce((a,b)=>parseDate(a.date)-parseDate(b.date)>0?a:b):null; }
        function showArrows(show) { 
            const left = document.getElementById('prevArrow');
            const right = document.getElementById('nextArrow');
            if (show) {
                left.style.display = 'block';
                right.style.display = 'block';
                setTimeout(() => positionArrows(), 50);
            } else {
                left.style.display = 'none';
                right.style.display = 'none';
            }
        }

        function positionArrows() {
            const titleElement = document.querySelector('.movie-title-overlay');
            if (!titleElement) return;
            const rect = titleElement.getBoundingClientRect();
            const centerY = rect.top + rect.height / 2;
            const arrows = document.querySelectorAll('.nav-arrow');
            arrows.forEach(arrow => {
                arrow.style.top = `${centerY}px`;
                arrow.style.transform = 'translateY(-50%)';
            });
        }

        function animateSlideTransition(direction, callback) {
            const container = document.getElementById('mainContent');
            if (!container) return callback();
            container.classList.add('slide-fade');
            container.classList.add('slide-fade-out');
            setTimeout(() => {
                callback();
                container.classList.remove('slide-fade-out');
                setTimeout(() => container.classList.remove('slide-fade'), 200);
            }, 150);
        }

        function generateMovieSlide(movie) {
            const sorted = [...movie.reviews].sort((a,b)=>a.verified!==b.verified?a.verified?-1:1:(a.approved!==b.approved?a.approved?-1:1:b.timestamp-a.timestamp));
            let revHtml = '';
            const currentToken = getSessionToken();
            sorted.forEach((r,idx) => {
                const origIdx = movie.reviews.findIndex(orig=>orig.timestamp===r.timestamp&&orig.author===r.author);
                const pending = !r.approved ? 'pending' : '';
                const verifiedMark = r.verified ? '<span class="verified-check">✓</span>' : '';
                const canEdit = (!r.approved && r.sessionToken === currentToken);
                const editButton = canEdit ? `<button class="review-action-btn edit-review-btn" data-idx="${origIdx}" data-movie-id="${movie.id}" title="Edytuj swoją recenzję">✎</button>` : '';
                const deleteOwnButton = canEdit ? `<button class="review-action-btn delete-own-review-btn" data-idx="${origIdx}" data-movie-id="${movie.id}" title="Usuń swoją recenzję">✕</button>` : '';
                revHtml += `<div class="review-row ${pending}" data-review-idx="${origIdx}">
                    <div class="review-left"><div style="display:flex;align-items:center;gap:2px;">${renderStars(r.stars)}${verifiedMark}</div><div class="review-author">${escapeHtml(r.author)}</div></div>
                    <div class="review-comment">${escapeHtml(r.comment)}</div>
                    <div class="review-actions">
                        ${!r.approved ? `<button class="review-action-btn approve-btn" data-idx="${origIdx}">✓</button>` : ''}
                        ${r.approved && !r.verified ? `<button class="review-action-btn verify-btn" data-idx="${origIdx}">✓</button>` : ''}
                        <button class="review-action-btn delete-review-btn" data-idx="${origIdx}">✕</button>
                        ${editButton}
                        ${deleteOwnButton}
                    </div>
                </div>`;
            });
            const sentHtml = movie.sentimentalValue ? `<div class="sentimental">✨ ${escapeHtml(movie.sentimentalValue)}</div>` : '';
            const posterUrl = movie.poster || '';
            const posterImg = posterUrl ? `<img class="poster-img" src="${escapeHtml(posterUrl)}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%221200%22%20height%3D%22300%22%3E%3Crect%20width%3D%221200%22%20height%3D%22300%22%20fill%3D%22%231a1a1a%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20fill%3D%22%23888%22%20font-size%3D%2224%22%3Ebrak%20plakatu%3C%2Ftext%3E%3C%2Fsvg%3E'">` : `<div class="poster-img" style="background:#1a1a1a; display:flex; align-items:center; justify-content:center; color:#888;">🎬 brak plakatu</div>`;
            const avg = avgWeighted(movie);
            const avgDisplay = avg !== '—' ? `${avg} ★` : '— ★';
            const linkHtml = movie.link ? `<div class="movie-link"><a href="${escapeHtml(movie.link)}" target="_blank">🔗 Link</a></div>` : '';
            const jellyfinUrl = `https://jellyfin.shepardgepard.org/web/#/search.html?query=${encodeURIComponent(movie.title)}`;
            return `<div class="carousel-slide" data-movie-id="${movie.id}">
                <div class="carousel-container">
                    <div class="slide">
                        <div class="poster-wrapper">
                            ${posterImg}
                            <a href="${jellyfinUrl}" target="_blank" class="movie-title-overlay">${escapeHtml(movie.title)}</a>
                            <button class="edit-movie-btn" data-movie-id="${movie.id}">✎</button>
                        </div>
                        <div class="movie-date">${escapeHtml(movie.date)}</div>
                        ${linkHtml}
                        <div class="reviews-grid">${revHtml}</div>
                        ${sentHtml}
                        <div class="add-review">
                            <div class="review-form-grid">
                                <div class="review-form-row">
                                    <div class="review-form-left"><input type="text" class="review-author-input" placeholder="Imię" maxlength="20"><div class="rating-input" id="starSelector_${movie.id}">${[1,2,3,4,5].map(n=>`<span class="star-select" data-value="${n}">★</span>`).join('')}</div></div>
                                    <div class="review-form-middle"><textarea class="review-comment-input" placeholder="Napisz kilka słów (Enter aby dodać)" maxlength="256"></textarea></div>
                                    <div class="avg-box" data-movie-id="${movie.id}">${avgDisplay}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function buildCarousel(selectedIndex) {
            const container = document.getElementById('mainContent');
            if (!container) return;
            container.style.overflow = 'hidden';
            container.innerHTML = `<div class="carousel-viewport"><div class="carousel-track" id="carouselTrack"></div></div>`;
            track = document.getElementById('carouselTrack');
            movies.forEach((m, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.innerHTML = generateMovieSlide(m);
                track.appendChild(slideDiv.firstChild);
            });
            currentSlideIndex = selectedIndex;
            updateCarouselPosition(false);
            attachDelegatedEvents();
            setTimeout(() => positionArrows(), 100);
        }

        function updateCarouselPosition(animate = true) {
            if (!track) return;
            const slideWidth = track.parentElement.clientWidth;
            const offset = -currentSlideIndex * slideWidth;
            track.style.transition = animate ? 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)' : 'none';
            track.style.transform = `translateX(${offset}px)`;
        }

        window.addEventListener('resize', () => {
            if (viewMode === 'movie' && track) {
                setTimeout(() => updateCarouselPosition(false), 100);
                setTimeout(() => positionArrows(), 150);
            }
        });

        function goToSlide(index, direction) {
            if (index < 0) index = movies.length - 1;
            if (index >= movies.length) index = 0;
            if (index === currentSlideIndex) return;
            animateSlideTransition(direction, () => {
                currentSlideIndex = index;
                currentMovieIndex = index;
                updateCarouselPosition(false);
                setTimeout(() => attachDelegatedEvents(), 50);
                setTimeout(() => positionArrows(), 100);
            });
        }

        function nextSlide() { goToSlide(currentSlideIndex + 1, 'right'); }
        function prevSlide() { goToSlide(currentSlideIndex - 1, 'left'); }

        function switchToMovie() {
            viewMode = 'movie';
            const container = document.getElementById('mainContent');
            container.style.overflow = 'hidden';
            container.classList.add('view-transition', 'view-fade-out');
            setTimeout(() => {
                buildCarousel(currentMovieIndex);
                container.classList.remove('view-fade-out');
                setTimeout(() => container.classList.remove('view-transition'), 200);
                showArrows(true);
            }, 150);
        }

        function switchToHome() {
            viewMode = 'home';
            const container = document.getElementById('mainContent');
            container.style.overflow = 'auto';
            container.classList.add('view-transition', 'view-fade-out');
            setTimeout(() => {
                renderHome();
                container.classList.remove('view-fade-out');
                setTimeout(() => container.classList.remove('view-transition'), 200);
                showArrows(false);
                setupPosterGlow();
            }, 150);
        }

        function renderHome() {
            const next = getNextMovie();
            const posterUrlNext = next?.poster || '';
            const nextPosterHtml = posterUrlNext ? `<img class="poster" src="${escapeHtml(posterUrlNext)}" onerror="this.style.display='none'">` : '<div class="poster" style="background:#1a1a1a; display:flex; align-items:center; justify-content:center; color:#666;">🎬</div>';
            document.getElementById('mainContent').innerHTML = `
                <div class="home-container">
                    <div class="next-movie-card" id="nextMovieCard">${nextPosterHtml}<h2>NAJBLIŻSZY SEANS</h2><div class="title">${escapeHtml(next?.title||'brak filmów')}</div><div class="date">${escapeHtml(next?.date||'')}</div></div>
                    <div class="ranking-section"><div class="ranking-header"><h3>RANKING</h3><span class="clickable-text" id="openProposeBtn">PROPONUJ</span></div><div class="ranking-list" id="rankingList"></div></div>
                </div>`;
            const rankingDiv = document.getElementById('rankingList');
            if (rankingDiv) {
                const threshold = 3;
                const high = movies.filter(m => countApprovedReviews(m) >= threshold);
                const low = movies.filter(m => countApprovedReviews(m) < threshold);
                const sortByAvg = (a,b) => parseFloat(avgWeighted(b)) - parseFloat(avgWeighted(a));
                high.sort(sortByAvg); low.sort(sortByAvg);
                const all = [...high, ...low];
                rankingDiv.innerHTML = all.map((m, idx) => {
                    const posterStyle = m.poster ? `background-image: url('${escapeHtml(m.poster)}'); background-size: cover;` : '';
                    const rating = avgWeighted(m);
                    const enough = countApprovedReviews(m) >= threshold;
                    const ratingText = enough ? (rating !== '—' ? `${rating} ★` : '— ★') : '–';
                    const badge = !enough ? '<span class="badge-text">(czeka na więcej ocen)</span>' : '';
                    return `<div class="ranking-item" data-idx="${movies.indexOf(m)}" style="${posterStyle}">
                                <span class="ranking-title">${idx+1}. ${escapeHtml(m.title)}${badge}</span>
                                <span class="ranking-rating">${ratingText}</span>
                            </div>`;
                }).join('');
                document.querySelectorAll('.ranking-item').forEach(el => {
                    el.onclick = () => {
                        const idx = parseInt(el.dataset.idx);
                        if (!isNaN(idx) && movies[idx]) {
                            currentMovieIndex = idx;
                            switchToMovie();
                        }
                    };
                });
            }
            document.getElementById('openProposeBtn').onclick = () => { loadProposals(); document.getElementById('proposeModal').style.display = 'flex'; };
            document.getElementById('cancelProposeBtn').onclick = () => document.getElementById('proposeModal').style.display = 'none';
            document.getElementById('submitProposeBtn').onclick = async () => {
                const title = document.getElementById('proposeTitle').value.trim();
                if (!title) return alert("Podaj tytuł");
                await db.collection("proposals").add({ title, votes: 0, timestamp: Date.now() });
                document.getElementById('proposeTitle').value = '';
                loadProposals();
            };
            const nextCard = document.getElementById('nextMovieCard');
            if (nextCard && next) {
                nextCard.onclick = () => {
                    const idx = movies.findIndex(m => m.id === next.id);
                    if (idx !== -1) { currentMovieIndex = idx; switchToMovie(); }
                };
            }
            showArrows(false);
            showLoading(false);
            setupPosterGlow();
        }

        // Funkcja glow z radial-gradient śledzącym kursor
        function setupPosterGlow() {
            const card = document.querySelector('.next-movie-card');
            if (!card) return;

            let rafId = null;

            const handleMouseMove = (e) => {
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    const rect = card.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    card.style.setProperty('--x', `${x}%`);
                    card.style.setProperty('--y', `${y}%`);

                    const poster = card.querySelector('.poster');
                    if (poster) {
                        const posterRect = poster.getBoundingClientRect();
                        const px = ((e.clientX - posterRect.left) / posterRect.width) * 100;
                        const py = ((e.clientY - posterRect.top) / posterRect.height) * 100;
                        poster.style.background = `
                            radial-gradient(circle at ${px}% ${py}%,
                            rgba(212,175,55,0.35) 0%,
                            rgba(212,175,55,0) 70%)
                        `;
                    }
                });
            };
            const handleMouseLeave = () => {
                if (rafId) cancelAnimationFrame(rafId);
                card.style.removeProperty('--x');
                card.style.removeProperty('--y');
                const poster = card.querySelector('.poster');
                if (poster) {
                    poster.style.background = '';
                }
            };
            card.addEventListener('mousemove', handleMouseMove);
            card.addEventListener('mouseleave', handleMouseLeave);
        }

        async function loadProposals() {
            const div = document.getElementById('proposalsList');
            if (!div) return;
            div.innerHTML = 'Ładowanie...';
            try {
                const snap = await db.collection("proposals").orderBy("votes","desc").get();
                const props = snap.docs.map(d=> ({id:d.id, ...d.data()}));
                if (props.length===0) { div.innerHTML = 'Brak propozycji. Bądź pierwszy!'; return; }
                const voted = JSON.parse(localStorage.getItem('proposal_votes')||'[]');
                div.innerHTML = props.map(p => {
                    const deleteBtn = isAdmin ? `<button class="proposal-delete" data-id="${p.id}">✕</button>` : '';
                    return `<div class="proposal-item">
                        <div class="proposal-info">
                            <span class="proposal-title">${escapeHtml(p.title)}</span>
                            ${deleteBtn}
                        </div>
                        <div class="proposal-actions">
                            <div class="proposal-vote ${voted.includes(p.id)?'voted':''}" data-id="${p.id}" style="pointer-events:${voted.includes(p.id)?'none':'auto'}">
                                <span>${p.votes||0}</span>
                                <span>${voted.includes(p.id)?'✓':'+1'}</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                document.querySelectorAll('.proposal-vote').forEach(el => {
                    if (el.classList.contains('voted')) return;
                    el.onclick = async () => {
                        const id = el.dataset.id;
                        let votedArr = JSON.parse(localStorage.getItem('proposal_votes')||'[]');
                        if (votedArr.includes(id)) return alert("Już głosowałeś");
                        const ref = db.collection("proposals").doc(id);
                        const doc = await ref.get();
                        if (!doc.exists) return;
                        await ref.update({ votes: (doc.data().votes||0)+1 });
                        votedArr.push(id);
                        localStorage.setItem('proposal_votes', JSON.stringify(votedArr));
                        loadProposals();
                    };
                });
                document.querySelectorAll('.proposal-delete').forEach(btn => {
                    btn.onclick = async () => {
                        if (!isAdmin && !isAdminAction()) return;
                        if (!confirm("Czy na pewno chcesz usunąć tę propozycję?")) return;
                        await db.collection("proposals").doc(btn.dataset.id).delete();
                        loadProposals();
                    };
                });
            } catch(e) { div.innerHTML = 'Błąd ładowania.'; }
        }

        async function deleteCurrentMovieFromEdit() {
            if (!window.currentEditMovieId) return;
            if (!isAdmin && !isAdminAction()) return;
            if (!confirm("Usunąć ten film? Nie można cofnąć.")) return;
            await db.collection("movies").doc(window.currentEditMovieId).delete();
            document.getElementById('editMovieModal').style.display = 'none';
            if (viewMode === 'movie' && movies[currentMovieIndex]?.id === window.currentEditMovieId) switchToHome();
        }

        async function seedDefault() {
            const snap = await db.collection("movies").get();
            if (snap.empty) for (const m of defaultMovies) await db.collection("movies").doc(m.id).set(m);
        }

        function attachDelegatedEvents() {
            const container = document.getElementById('mainContent');
            if (!container) return;
            // Edycja filmu
            container.querySelectorAll('.edit-movie-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const movieId = btn.dataset.movieId;
                    const movie = movies.find(m => m.id === movieId);
                    if (!movie) return;
                    if (!isAdmin && !isAdminAction()) return;
                    document.getElementById('editTitle').value = movie.title;
                    document.getElementById('editDate').value = movie.date ? movie.date.split('.').reverse().join('-') : '';
                    document.getElementById('editPosterUrl').value = movie.poster || '';
                    document.getElementById('editLink').value = movie.link || '';
                    document.getElementById('editSentimental').value = movie.sentimentalValue || '';
                    document.getElementById('editMovieModal').style.display = 'flex';
                    window.currentEditMovieId = movie.id;
                };
            });
            // Akcje recenzji (admin)
            container.querySelectorAll('.approve-btn, .verify-btn, .delete-review-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    if (!isAdmin && !isAdminAction()) return;
                    const reviewIdx = parseInt(btn.dataset.idx);
                    const slide = btn.closest('.carousel-slide');
                    const movieId = slide.dataset.movieId;
                    const movie = movies.find(m => m.id === movieId);
                    if (!movie) return;
                    const updatedReviews = [...movie.reviews];
                    let action = '';
                    if (btn.classList.contains('approve-btn')) action = 'zatwierdzić';
                    else if (btn.classList.contains('verify-btn')) action = 'nadać JLL Verified';
                    else if (btn.classList.contains('delete-review-btn')) action = 'usunąć';
                    if (action && !confirm(`Czy na pewno chcesz ${action} tę recenzję?`)) return;
                    if (btn.classList.contains('approve-btn')) {
                        updatedReviews[reviewIdx].approved = true;
                        updatedReviews[reviewIdx].timestamp = Date.now();
                    } else if (btn.classList.contains('verify-btn')) {
                        updatedReviews[reviewIdx].verified = true;
                        updatedReviews[reviewIdx].timestamp = Date.now();
                    } else if (btn.classList.contains('delete-review-btn')) {
                        updatedReviews.splice(reviewIdx, 1);
                    }
                    await db.collection("movies").doc(movie.id).update({ reviews: updatedReviews });
                };
            });
            // Edycja własnej recenzji
            container.querySelectorAll('.edit-review-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const reviewIdx = parseInt(btn.dataset.idx);
                    const movieId = btn.dataset.movieId;
                    const movie = movies.find(m => m.id === movieId);
                    if (!movie) return;
                    const review = movie.reviews[reviewIdx];
                    if (!review || review.approved) return;
                    const currentToken = getSessionToken();
                    if (review.sessionToken !== currentToken) {
                        alert("Nie możesz edytować tej recenzji – sesja wygasła.");
                        return;
                    }
                    currentEditReviewData = { movieId, reviewIdx, stars: review.stars, comment: review.comment };
                    const editModal = document.getElementById('editReviewModal');
                    const starContainer = editModal.querySelector('#editStarSelector');
                    starContainer.innerHTML = [1,2,3,4,5].map(n => `<span class="star-select" data-value="${n}">★</span>`).join('');
                    const stars = starContainer.querySelectorAll('.star-select');
                    stars.forEach((s, i) => i < review.stars ? s.classList.add('selected') : s.classList.remove('selected'));
                    stars.forEach((s, idx) => {
                        s.onclick = () => {
                            const val = idx+1;
                            stars.forEach((ss, j) => j < val ? ss.classList.add('selected') : ss.classList.remove('selected'));
                            currentEditReviewData.stars = val;
                        };
                    });
                    document.getElementById('editReviewComment').value = review.comment;
                    editModal.style.display = 'flex';
                    window.currentEditReviewData = currentEditReviewData;
                };
            });
            // Usuwanie własnej recenzji
            container.querySelectorAll('.delete-own-review-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const reviewIdx = parseInt(btn.dataset.idx);
                    const movieId = btn.dataset.movieId;
                    const movie = movies.find(m => m.id === movieId);
                    if (!movie) return;
                    const review = movie.reviews[reviewIdx];
                    if (!review || review.approved) return;
                    const currentToken = getSessionToken();
                    if (review.sessionToken !== currentToken) {
                        alert("Nie możesz usunąć tej recenzji – sesja wygasła.");
                        return;
                    }
                    if (!confirm("Czy na pewno chcesz usunąć swoją recenzję?")) return;
                    const updatedReviews = [...movie.reviews];
                    updatedReviews.splice(reviewIdx, 1);
                    await db.collection("movies").doc(movie.id).update({ reviews: updatedReviews });
                };
            });
            // Dodawanie recenzji z blokadą antyspamową
            container.querySelectorAll('.carousel-slide').forEach(slide => {
                const movieId = slide.dataset.movieId;
                const movie = movies.find(m => m.id === movieId);
                if (!movie) return;
                const starSpans = slide.querySelectorAll('.star-select');
                let selectedStars = 0;
                starSpans.forEach((span, i) => {
                    span.onclick = () => {
                        selectedStars = i+1;
                        starSpans.forEach((s,j) => s.classList.toggle('selected', j<=i));
                    };
                });
                const avgBox = slide.querySelector('.avg-box');
                const addReview = async () => {
                    const currentToken = getSessionToken();
                    const existingPending = movie.reviews.some(r => !r.approved && r.sessionToken === currentToken);
                    if (existingPending) {
                        alert("Masz już niezatwierdzoną recenzję w tej sesji. Możesz ją edytować lub usunąć, zanim dodasz kolejną.");
                        return;
                    }
                    const authorInput = slide.querySelector('.review-author-input');
                    const textarea = slide.querySelector('.review-comment-input');
                    const author = authorInput ? authorInput.value.trim() : '';
                    const comment = textarea ? textarea.value.trim() : '';
                    if (!author) { alert("Podaj imię"); return; }
                    if (selectedStars === 0) { alert("Wybierz gwiazdki"); return; }
                    const newReview = { author, stars: selectedStars, comment: comment || "(bez komentarza)", approved: false, verified: false, timestamp: Date.now(), sessionToken: currentToken };
                    const updatedReviews = [...movie.reviews, newReview];
                    await db.collection("movies").doc(movie.id).update({ reviews: updatedReviews });
                    if (authorInput) authorInput.value = '';
                    if (textarea) textarea.value = '';
                    selectedStars = 0;
                    starSpans.forEach(s => s.classList.remove('selected'));
                };
                const textarea = slide.querySelector('.review-comment-input');
                if (textarea) {
                    const newTextarea = textarea.cloneNode(true);
                    textarea.parentNode.replaceChild(newTextarea, textarea);
                    newTextarea.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            addReview();
                        }
                    });
                }
                if (avgBox) avgBox.onclick = () => addReview();
            });
        }

        function startListener() {
            if (unsubscribeMovies) unsubscribeMovies();
            showLoading(true);
            seedDefault().then(() => {
                unsubscribeMovies = db.collection("movies").onSnapshot(snap => {
                    const newMovies = [];
                    snap.forEach(doc => newMovies.push(doc.data()));
                    movies = newMovies;
                    if (movies.length === 0) {
                        if (viewMode === 'home') renderHome();
                        else switchToHome();
                    } else {
                        if (viewMode === 'home') renderHome();
                        else {
                            if (track) {
                                const oldId = movies[currentMovieIndex]?.id;
                                while (track.firstChild) track.removeChild(track.firstChild);
                                movies.forEach((m, idx) => {
                                    const slideDiv = document.createElement('div');
                                    slideDiv.innerHTML = generateMovieSlide(m);
                                    track.appendChild(slideDiv.firstChild);
                                });
                                if (oldId) {
                                    const newIdx = movies.findIndex(m => m.id === oldId);
                                    if (newIdx !== -1) currentMovieIndex = newIdx;
                                    else currentMovieIndex = 0;
                                } else currentMovieIndex = 0;
                                currentSlideIndex = currentMovieIndex;
                                updateCarouselPosition(false);
                                attachDelegatedEvents();
                                setTimeout(() => positionArrows(), 100);
                            } else {
                                buildCarousel(currentMovieIndex);
                            }
                        }
                    }
                    showLoading(false);
                });
            });
        }

        document.getElementById('cancelEditReviewBtn').onclick = () => document.getElementById('editReviewModal').style.display = 'none';
        document.getElementById('saveEditReviewBtn').onclick = async () => {
            const data = window.currentEditReviewData;
            if (!data) return;
            const movieId = data.movieId, reviewIdx = data.reviewIdx, newStars = data.stars, newComment = document.getElementById('editReviewComment').value.trim();
            const movie = movies.find(m => m.id === movieId);
            if (!movie) return;
            const review = movie.reviews[reviewIdx];
            if (!review || review.approved) { alert("Recenzja nie może być edytowana (jest już zatwierdzona)."); document.getElementById('editReviewModal').style.display = 'none'; return; }
            const currentToken = getSessionToken();
            if (review.sessionToken !== currentToken) { alert("Nie możesz edytować tej recenzji – sesja wygasła."); document.getElementById('editReviewModal').style.display = 'none'; return; }
            const updatedReviews = [...movie.reviews];
            updatedReviews[reviewIdx] = { ...review, stars: newStars, comment: newComment || "(bez komentarza)", timestamp: Date.now() };
            await db.collection("movies").doc(movieId).update({ reviews: updatedReviews });
            document.getElementById('editReviewModal').style.display = 'none';
            if (viewMode === 'movie') renderMovie(); else renderHome();
        };

        document.getElementById('openModalBtn').onclick = () => { if (!isAdmin && !isAdminAction()) return; document.getElementById('movieModal').style.display = 'flex'; };
        document.getElementById('homeBtn').onclick = () => { if (viewMode !== 'home') switchToHome(); };
        document.getElementById('cancelModalBtn').onclick = () => document.getElementById('movieModal').style.display = 'none';
        document.getElementById('cancelEditBtn').onclick = () => document.getElementById('editMovieModal').style.display = 'none';
        document.getElementById('cancelProposeBtn').onclick = () => document.getElementById('proposeModal').style.display = 'none';
        document.getElementById('cancelAdminLoginBtn').onclick = () => document.getElementById('adminLoginModal').style.display = 'none';
        document.getElementById('confirmAdminLoginBtn').onclick = () => {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === getDynamicAdminPassword()) { setAdminMode(true); document.getElementById('adminLoginModal').style.display = 'none'; alert("Tryb admina włączony."); }
            else alert("Złe hasło");
        };
        document.getElementById('deleteMovieFromEditBtn').onclick = deleteCurrentMovieFromEdit;
        window.onclick = e => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        document.getElementById('saveMovieBtn').onclick = async () => {
            if (!isAdmin && !isAdminAction()) return;
            const title = document.getElementById('newTitle').value.trim();
            if (!title) return alert("Tytuł wymagany");
            const dateRaw = document.getElementById('newDate').value;
            const date = dateRaw ? dateRaw.split('-').reverse().join('.') : '';
            const newMovie = { id: Date.now().toString(), date, title, poster: document.getElementById('newPosterUrl').value.trim(), link: document.getElementById('newLink').value.trim(), reviews: [], sentimentalValue: document.getElementById('newSentimental').value.trim() };
            await db.collection("movies").doc(newMovie.id).set(newMovie);
            document.getElementById('movieModal').style.display = 'none';
            document.getElementById('newTitle').value = ''; document.getElementById('newPosterUrl').value = ''; document.getElementById('newLink').value = ''; document.getElementById('newSentimental').value = '';
        };
        document.getElementById('saveEditBtn').onclick = async () => {
            if (!isAdmin && !isAdminAction()) return;
            const title = document.getElementById('editTitle').value.trim();
            if (!title) return alert("Tytuł wymagany");
            const dateRaw = document.getElementById('editDate').value;
            const date = dateRaw ? dateRaw.split('-').reverse().join('.') : '';
            const update = { title, date, poster: document.getElementById('editPosterUrl').value.trim(), link: document.getElementById('editLink').value.trim(), sentimentalValue: document.getElementById('editSentimental').value.trim() };
            await db.collection("movies").doc(window.currentEditMovieId).update(update);
            document.getElementById('editMovieModal').style.display = 'none';
        };
        document.getElementById('homeLogo').onclick = () => { if (viewMode !== 'home') switchToHome(); };
        document.getElementById('prevArrow').onclick = () => { if (viewMode === 'movie') prevSlide(); };
        document.getElementById('nextArrow').onclick = () => { if (viewMode === 'movie') nextSlide(); };

        function showLoading(show) {
            const ld = document.querySelector('.loading-indicator');
            if (ld) ld.style.display = show ? 'flex' : 'none';
        }

        checkAdminFromStorage();
        startListener();
    </script>
</body>
</html>
